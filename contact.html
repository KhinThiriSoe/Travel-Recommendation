<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - TravelBloom</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="contact-container">
    <nav class="navbar">
        <img src="images/logo.png" alt="Travel Logo" id="logo">
        <h3 id="company-name">TravelBloom</h3>
        <ul class="nav-links">
            <li class="nav-link"><a href="travel_recommendation.html">Home</a></li>
            <li class="nav-link"><a href="aboutus.html">About Us</a></li>
            <li class="nav-link"><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

    <section class="contact-content">
        <h2>Contact us</h2>
        <form class="contact-form-container">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit" id="submit-contact">Submit</button>
        </form>
    </section>

    <footer class="footer">
        <p id="copy-right">&copy; 2026 TravelBloom. All rights reserved.</p>

        <section class="social-media-links">
            <a href="#" class="fa"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" class="fa"><i class="fa-brands fa-twitter"></i></a>
            <a href="#" class="fa"><i class="fa-brands fa-instagram"></i></a>
        </section>
    </footer>
</body>

</html>
